name: Build Release AAB + APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # Decode the release keystore from a base64 secret into app/release.jks.
      # The secret RELEASE_KEYSTORE_BASE64 must hold the base64-encoded contents
      # of the upload keystore generated with `keytool -genkeypair`.
      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > app/release.jks
          ls -la app/release.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=app/release.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Assemble release AAB (Play Store)
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Assemble release APK (sideload testing)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename artifacts with run metadata
        run: |
          mkdir -p release-assets
          cp app/build/outputs/bundle/release/app-release.aab \
             "release-assets/eject-button-release-run${{ github.run_number }}-${GITHUB_SHA::7}.aab"
          cp app/build/outputs/apk/release/app-release.apk \
             "release-assets/eject-button-release-run${{ github.run_number }}-${GITHUB_SHA::7}.apk"
          ls -la release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }} (${{ github.ref_name }} @ ${{ github.sha }})"
          prerelease: false
          body: |
            Production-signed release artifacts from commit `${{ github.sha }}`.

            - **AAB** — upload this to Play Console (Internal Testing → Production).
            - **APK** — sideload directly for release-build QA.
          files: release-assets/*
          fail_on_unmatched_files: true

      # Clean up the decoded keystore so it cannot leak into later steps.
      - name: Scrub keystore
        if: always()
        run: |
          rm -f app/release.jks keystore.properties
