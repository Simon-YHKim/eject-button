name: Build Debug APK

on:
  push:
    branches:
      - 'claude/**'
      - main
      - Eject_Button_app
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with run metadata
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release-assets/eject-button-debug-run${{ github.run_number }}-${GITHUB_SHA::7}.apk"
          ls -la release-assets/

      - name: Publish debug build as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-build-${{ github.run_number }}
          name: "Debug Build #${{ github.run_number }} (${{ github.ref_name }} @ ${{ github.sha }})"
          prerelease: true
          body: |
            Debug APK built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.
            Install directly on an Android device for testing.
          files: release-assets/*.apk
          fail_on_unmatched_files: true
