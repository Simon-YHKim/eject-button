# DISABLED — repo is private, so GitHub Pages requires a paid plan.
# We are using Cloudflare Pages instead (free for private repos).
# Left in place as workflow_dispatch-only in case we switch hosts later.
name: Deploy Pages (disabled)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables GitHub Pages automatically on first run if the repo has
      # not yet had Pages configured. Requires pages: write permission.
      # enablement: true tells the action to self-enable Pages via the
      # REST API instead of failing with "Pages site not found".
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
